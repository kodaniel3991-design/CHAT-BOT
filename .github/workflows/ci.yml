name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install
        run: npm ci

      - name: Build packages
        run: npm run build:packages

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build app
        run: npm run build -w demo
